name: Build Binary Addon (Windows)

on: [push, pull_request]

jobs:
  windows-64:
    runs-on: windows-latest
    steps:
      # 1. Checkout the Addon Code
      - name: Checkout Addon
        uses: actions/checkout@v4
        with:
          path: pvr.dispatcharr

      # 2. Checkout Kodi Source (Omega) - Required for build system
      - name: Checkout Kodi
        uses: actions/checkout@v4
        with:
          repository: xbmc/xbmc
          ref: Omega
          path: kodi

      # 3. Setup CMake
      - name: Setup CMake
        uses: lukka/get-cmake@latest

      # 4. Prepare addon definition for local source
      - name: Setup Addon Definition
        shell: bash
        run: |
          mkdir -p addon-defs/pvr.dispatcharr
          ADDON_PATH=$(cygpath -m "$PWD/pvr.dispatcharr")
          echo "pvr.dispatcharr file:///${ADDON_PATH}" > addon-defs/pvr.dispatcharr/pvr.dispatcharr.txt

      # 5. Configure Build (The "Superbuild" Method)
      - name: Configure CMake
        shell: bash
        run: |
          ROOT=$(pwd)
          mkdir build
          cd build
          cmake -G "Visual Studio 17 2022" -A x64 \
            -DADDONS_TO_BUILD=pvr.dispatcharr \
            -DADDON_SRC_PREFIX="${ROOT}" \
            -DADDONS_DEFINITION_DIR="${ROOT}/addon-defs" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${ROOT}/output" \
            -DPACKAGE_ZIP=1 \
            ../kodi/cmake/addons

      # 6. Compile and Package
      - name: Build
        shell: bash
        run: |
          cd build
          cmake --build . --config Release
          echo "Build completed. Now packaging addon..."
          cmake --build . --config Release --target package-pvr.dispatcharr

      # 6b. Manual ZIP creation from output
      - name: Package Addon Manually
        shell: pwsh
        run: |
          Write-Host "Checking for built addon files..."
          if (Test-Path "output/pvr.dispatcharr") {
            Write-Host "Found addon in output/pvr.dispatcharr"
            Get-ChildItem -Path "output/pvr.dispatcharr"
            
            Write-Host "Creating ZIP file with correct Kodi structure..."
            Write-Host "ZIP should have pvr.dispatcharr/ at root level"
            
            # Create ZIP: the compression path should be just the folder name
            # This way the ZIP will contain pvr.dispatcharr/ at root
            Push-Location output
            Compress-Archive -Path "pvr.dispatcharr" -DestinationPath "../K21-Windows-Addon.zip" -Force
            Pop-Location
            
            Write-Host "Created K21-Windows-Addon.zip"
            Get-ChildItem -Path "K21-Windows-Addon.zip"
            
            # Verify ZIP structure
            Write-Host "Verifying ZIP structure..."
            $zipContent = Expand-Archive -Path "K21-Windows-Addon.zip" -DestinationPath "zip_test" -PassThru
            Write-Host "ZIP root contents:"
            Get-ChildItem -Path "zip_test"
          } else {
            Write-Host "ERROR: output/pvr.dispatcharr not found"
            Get-ChildItem -Path "output" -Recurse | Select-Object -First 20
          }

      # 7. Detailed Build Output Inspection
      - name: List All Generated Files
        shell: bash
        run: |
          echo "=== Current working directory ==="
          pwd
          echo ""
          echo "=== Directory tree (limited to 3 levels) ==="
          find . -maxdepth 3 -type f -name "*dispatcharr*" 2>/dev/null || echo "No dispatcharr files found"
          echo ""
          echo "=== All .zip files anywhere ==="
          find . -name "*.zip" 2>/dev/null | head -20 || echo "No zip files found"
          echo ""
          echo "=== Build directory contents ==="
          ls -la build/ 2>/dev/null | head -30 || echo "Build directory not found"
          echo ""
          echo "=== Contents of build/addons ==="
          ls -laR build/addons 2>/dev/null || echo "No build/addons directory"
          echo ""
          echo "=== CMake build log (last 50 lines) ==="
          tail -50 build/CMakeFiles/CMakeOutput.log 2>/dev/null || echo "No CMake output log"

      # 8. Upload Artifact
      - name: Upload Addon ZIP
        uses: actions/upload-artifact@v4
        with:
          name: K21-Windows-Addon
          path: |
            K21-Windows-Addon.zip
          if-no-files-found: warn

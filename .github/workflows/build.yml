name: Build
on: [push, pull_request]
env:
  app_id: pvr.dispatcharr
  kodi_version: master

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "GCC build"
            CC: gcc
            CXX: g++
          - name: "Clang build"
            CC: clang
            CXX: clang++
    steps:
    - name: Checkout Kodi repo
      uses: actions/checkout@v3
      with:
        repository: xbmc/xbmc
        ref: ${{ env.kodi_version }}
        path: xbmc
    - name: Checkout add-on repo
      uses: actions/checkout@v3
      with:
        path: ${{ env.app_id }}
    - name: Prepare
      run: |
        mkdir -p ${{ github.workspace }}/xbmc/cmake/addons/addons/${app_id}
        echo ${app_id} ${{ github.workspace }}/${app_id} > ${{ github.workspace }}/xbmc/cmake/addons/addons/${app_id}/${app_id}.txt
    - name: Configure
      env:
        CC: ${{ matrix.CC }}
        CXX: ${{ matrix.CXX }}
      run: |
        cmake \
          -B ${app_id}/build \
          -DADDONS_TO_BUILD=${app_id} \
          -DADDON_SRC_PREFIX=${{ github.workspace }} \
          -DADDONS_DEFINITION_DIR=${{ github.workspace }}/xbmc/cmake/addons/addons \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/xbmc/addons \
          -DPACKAGE_ZIP=1 \
          ${{ github.workspace }}/xbmc/cmake/addons
    - name: Build
      env:
        CC: ${{ matrix.CC }}
        CXX: ${{ matrix.CXX }}
      run: |
        make -C ${app_id}/build -j$(getconf _NPROCESSORS_ONLN)
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Kodi-Addon-Linux-${{ matrix.name }}
        path: ${{ github.workspace }}/${{ env.app_id }}/build/addon
        if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            generator: "Visual Studio 17 2022"
            platform: x64
    steps:
    - name: Checkout Kodi repo
      uses: actions/checkout@v3
      with:
        repository: xbmc/xbmc
        ref: ${{ env.kodi_version }}
        path: xbmc
    - name: Checkout add-on repo
      uses: actions/checkout@v3
      with:
        path: ${{ env.app_id }}
    - name: Install dependencies
      run: |
        choco install cmake -y
    - name: Prepare
      run: |
        mkdir -p "${{ github.workspace }}/xbmc/cmake/addons/addons/${{ env.app_id }}"
        echo "${{ env.app_id }} ${{ github.workspace }}/${{ env.app_id }}" | Out-File -Encoding ASCII "${{ github.workspace }}/xbmc/cmake/addons/addons/${{ env.app_id }}/${{ env.app_id }}.txt"
    - name: Configure
      run: |
        cmake `
          -B "${{ env.app_id }}/build" `
          -G "${{ matrix.generator }}" `
          -A ${{ matrix.platform }} `
          -DADDONS_TO_BUILD=${{ env.app_id }} `
          -DADDON_SRC_PREFIX="${{ github.workspace }}" `
          -DADDONS_DEFINITION_DIR="${{ github.workspace }}/xbmc/cmake/addons/addons" `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/xbmc/addons" `
          -DPACKAGE_ZIP=1 `
          "${{ github.workspace }}/xbmc/cmake/addons"
    - name: Build
      run: |
        cmake --build "${{ env.app_id }}/build" --config Release --parallel
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Kodi-Addon-Windows-${{ matrix.arch }}
        path: ${{ github.workspace }}/${{ env.app_id }}/build/addon
        if-no-files-found: error
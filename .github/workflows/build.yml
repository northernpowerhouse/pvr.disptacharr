name: Build Binary Addon (Windows)

on: [push, pull_request]

jobs:
  windows-64:
    runs-on: windows-latest
    steps:
      # 1. Checkout the Addon Code
      - name: Checkout Addon
        uses: actions/checkout@v4
        with:
          path: addon

      # 2. Checkout Kodi Source (Omega) - Required for build system
      - name: Checkout Kodi
        uses: actions/checkout@v4
        with:
          repository: xbmc/xbmc
          ref: Omega
          path: kodi

      # 3. Setup CMake
      - name: Setup CMake
        uses: lukka/get-cmake@latest

      # 4. Prepare addon definition for local source
      - name: Setup Addon Definition
        shell: bash
        run: |
          mkdir -p addon-defs/pvr.dispatcharr
          ADDON_PATH=$(cygpath -m "$PWD/addon")
          echo "pvr.dispatcharr file:///${ADDON_PATH}" > addon-defs/pvr.dispatcharr/pvr.dispatcharr.txt

      # 5. Configure Build (The "Superbuild" Method)
      - name: Configure CMake
        shell: bash
        run: |
          ROOT=$(pwd)
          mkdir build
          cd build
          cmake -G "Visual Studio 17 2022" -A x64 \
            -DADDONS_TO_BUILD=pvr.dispatcharr \
            -DADDONS_DEFINITION_DIR="${ROOT}/addon-defs" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=../kodi/addons \
            -DPACKAGE_ZIP=1 \
            ../kodi/cmake/addons

      # 6. Compile and Package
      - name: Build
        shell: bash
        run: |
          cd build
          cmake --build . --config Release

      # 7. Upload Artifact
      - name: Upload Addon ZIP
        uses: actions/upload-artifact@v4
        with:
          name: K21-Windows-Addon
          path: build/*.zip
